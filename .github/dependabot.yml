version: 2
updates:
  - package-ecosystem: "cargo"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "rust"
    commit-message:
      prefix: "deps"
      include: "scope"
    ignore:
      # Crypto/protocol major-version upgrades must be migrated deliberately.
      # Dependabot PRs for chacha20poly1305 0.11 and sha2 0.11 broke the
      # release gate by mixing digest/crypto-common generations with hkdf 0.12.
      # Keep patch/minor updates automated, but require a planned compatibility
      # branch and protocol-vector review for semver-major Cargo upgrades.
      - dependency-name: "*"
        update-types:
          - "version-update:semver-major"

  - package-ecosystem: "npm"
    directory: "/apps/web"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "web"
    commit-message:
      prefix: "deps"
      include: "scope"
    ignore:
      # Frontend toolchain semver-major updates can break vue-tsc/Vite compatibility
      # (TypeScript 7 removed package subpaths used by current vue-tsc). Keep
      # patch/minor updates automated, but migrate majors on a compatibility branch.
      - dependency-name: "*"
        update-types:
          - "version-update:semver-major"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "ci"
    commit-message:
      prefix: "deps"
      include: "scope"
