name: Fuzz

on:
  schedule:
    - cron: '17 3 * * 1'  # Weekly Monday 03:17 UTC
  workflow_dispatch:

permissions:
  contents: read

jobs:
  fuzz:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target: [core_imports, node_dht_rpc, node_control_request]
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Rust nightly
        uses: dtolnay/rust-toolchain@nightly

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: fuzz

      - name: Install cargo-fuzz
        run: cargo install cargo-fuzz

      - name: Run fuzz target (${{ matrix.target }})
        run: cargo fuzz run ${{ matrix.target }} -- -max_total_time=300
        working-directory: fuzz
