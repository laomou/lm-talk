name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  code:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
          components: rustfmt, clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: .

      - name: Check format, lint, and core tests
        run: |
          cargo fmt --check
          cargo clippy --workspace --all-targets -- -D warnings
          cargo test -p lm_core

  node:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: .

      - name: Test lm_node
        run: cargo test -p lm_node

  wasm:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: .

      - name: Install wasm-pack
        uses: taiki-e/install-action@wasm-pack

      - name: Test lm_wasm and build browser Wasm
        run: |
          cargo test -p lm_wasm
          wasm-pack build crates/lm_wasm --target web --out-dir ../../apps/web/src/wasm --no-opt

  web:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install wasm-pack
        uses: taiki-e/install-action@wasm-pack

      - name: Install web dependencies
        working-directory: apps/web
        run: npm ci

      - name: Build Wasm
        working-directory: apps/web
        run: npm run build:wasm

      - name: Check types
        working-directory: apps/web
        run: npx vue-tsc --noEmit

      - name: Build production web app
        working-directory: apps/web
        run: npx vite build

      - name: Install Playwright browser
        working-directory: apps/web
        run: npx playwright install --with-deps chromium

      - name: Run browser user flows
        working-directory: apps/web
        run: npm run test:e2e

  dependency-audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Detect dependency file changes
        id: deps
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" != "pull_request" ]]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if git diff --quiet "${{ github.event.pull_request.base.sha }}" "${{ github.sha }}" -- \
            Cargo.lock Cargo.toml crates/*/Cargo.toml \
            apps/web/package.json apps/web/package-lock.json; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Node
        if: steps.deps.outputs.changed == 'true'
        uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Setup Rust
        if: steps.deps.outputs.changed == 'true'
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        if: steps.deps.outputs.changed == 'true'
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: .

      - name: Install cargo-audit
        if: steps.deps.outputs.changed == 'true'
        uses: taiki-e/install-action@cargo-audit

      - name: Install web dependencies
        if: steps.deps.outputs.changed == 'true'
        working-directory: apps/web
        run: npm ci

      - name: Dependency audit
        if: steps.deps.outputs.changed == 'true'
        run: ./scripts/check-audit.sh

      - name: Skip dependency audit
        if: steps.deps.outputs.changed != 'true'
        run: echo "No dependency manifests or lockfiles changed; skipping dependency audit."


  dependency-review:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Dependency review
        uses: actions/dependency-review-action@v5
        with:
          fail-on-severity: high
