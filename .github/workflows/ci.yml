name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  release-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
          components: rustfmt

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            .
            fuzz

      - name: Install wasm-pack
        uses: taiki-e/install-action@wasm-pack

      - name: Install web dependencies
        working-directory: apps/web
        run: npm ci

      - name: Release check quick
        env:
          RELEASE_CHECK_SKIP_CLIPPY: '1'
        run: ./scripts/release-check.sh quick

  clippy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
          components: clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: .

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

  dependency-audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Detect dependency file changes
        id: deps
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" != "pull_request" ]]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if git diff --quiet "${{ github.event.pull_request.base.sha }}" "${{ github.sha }}" -- \
            Cargo.lock Cargo.toml crates/*/Cargo.toml fuzz/Cargo.toml \
            apps/web/package.json apps/web/package-lock.json; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Node
        if: steps.deps.outputs.changed == 'true'
        uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Setup Rust
        if: steps.deps.outputs.changed == 'true'
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        if: steps.deps.outputs.changed == 'true'
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: .

      - name: Install cargo-audit
        if: steps.deps.outputs.changed == 'true'
        uses: taiki-e/install-action@cargo-audit

      - name: Install web dependencies
        if: steps.deps.outputs.changed == 'true'
        working-directory: apps/web
        run: npm ci

      - name: Dependency audit
        if: steps.deps.outputs.changed == 'true'
        run: ./scripts/check-audit.sh

      - name: Skip dependency audit
        if: steps.deps.outputs.changed != 'true'
        run: echo "No dependency manifests or lockfiles changed; skipping dependency audit."


  dependency-review:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Dependency review
        uses: actions/dependency-review-action@v5
        with:
          fail-on-severity: high
