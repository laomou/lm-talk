name: Release Node Artifacts

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to create/update, for example v0.1.0'
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release-node-${{ github.event.inputs.tag || github.ref_name }}
  cancel-in-progress: false

env:
  RELEASE_TAG: ${{ github.event.inputs.tag || github.ref_name }}

jobs:
  build-node:
    name: Build ${{ matrix.package_name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            package_name: lm_node-linux-x86_64
            cargo_features: ''
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            package_name: lm_node-linux-x86_64-sqlcipher
            cargo_features: sqlcipher
          - os: macos-13
            target: x86_64-apple-darwin
            package_name: lm_node-macos-x86_64
            cargo_features: ''
          - os: macos-latest
            target: aarch64-apple-darwin
            package_name: lm_node-macos-arm64
            cargo_features: ''
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            package_name: lm_node-windows-x86_64
            cargo_features: ''

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: .
          key: release-node-${{ matrix.target }}-${{ matrix.package_name }}

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Build native node
        shell: bash
        run: |
          set -euo pipefail
          if [[ -n "${{ matrix.cargo_features }}" ]]; then
            cargo build --locked --release -p lm_node --target ${{ matrix.target }} --features "${{ matrix.cargo_features }}"
          else
            cargo build --locked --release -p lm_node --target ${{ matrix.target }}
          fi

      - name: Smoke test binary help
        if: ${{ matrix.target != 'aarch64-apple-darwin' || runner.arch == 'ARM64' }}
        shell: bash
        run: |
          set -euo pipefail
          BIN="target/${{ matrix.target }}/release/lm_node"
          if [[ "${{ matrix.target }}" == *"windows"* || "${{ matrix.target }}" == *"msvc"* ]]; then
            BIN="${BIN}.exe"
          fi
          "$BIN" > lm_node_help.txt 2>&1
          grep -q "LM Talk" lm_node_help.txt

      - name: Smoke test SQLCipher release binary
        if: ${{ matrix.package_name == 'lm_node-linux-x86_64-sqlcipher' }}
        shell: bash
        env:
          LM_NODE_SQLCIPHER_BIN: target/${{ matrix.target }}/release/lm_node
          LM_NODE_SQLCIPHER_SMOKE_LOG: sqlcipher-release-smoke.log
          LM_NODE_SQLCIPHER_SMOKE_REPORT: sqlcipher-release-smoke-report.json
        run: ./scripts/sqlcipher-deploy-smoke.sh

      - name: Upload SQLCipher release smoke report
        if: ${{ matrix.package_name == 'lm_node-linux-x86_64-sqlcipher' && always() }}
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.package_name }}-smoke
          path: |
            sqlcipher-release-smoke.log
            sqlcipher-release-smoke-report.json
          if-no-files-found: warn

      - name: Package native node
        run: >-
          python scripts/package-node-release.py
          --target ${{ matrix.target }}
          --package-name ${{ matrix.package_name }}
          --cargo-features "${{ matrix.cargo_features }}"
          --out-dir dist

      - name: Upload release package
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.package_name }}
          path: |
            dist/*
          if-no-files-found: error

  publish-release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build-node
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Download release packages
        uses: actions/download-artifact@v8
        with:
          path: release-dist
          merge-multiple: true

      - name: Create combined checksums and release notes
        shell: bash
        run: |
          set -euo pipefail
          cd release-dist
          cat *.sha256 | sort > SHA256SUMS.txt
          cd ..
          cat > RELEASE_NOTES.md <<'EOF'
          # LM Talk native node artifacts

          This release publishes native `lm_node` binaries for:

          - Linux x86_64: `lm_node-linux-x86_64.tar.gz`
          - Linux x86_64 with bundled SQLCipher: `lm_node-linux-x86_64-sqlcipher.tar.gz`
          - macOS Intel: `lm_node-macos-x86_64.tar.gz`
          - macOS Apple Silicon: `lm_node-macos-arm64.tar.gz`
          - Windows x86_64: `lm_node-windows-x86_64.zip`

          Verify downloads with `SHA256SUMS.txt` or the per-artifact `.sha256` files. Each archive also includes `RELEASE_INFO.txt` with the source commit, build timestamp, Rust toolchain details, and binary SHA256.

          SQLCipher note: the `lm_node-linux-x86_64-sqlcipher` artifact is built with the `lm_node/sqlcipher` feature for database-level `state_db` encryption. Verify deployment with `./scripts/sqlcipher-deploy-smoke.sh` or archived `/control/stats` + `/control/metrics` evidence showing `state_db_encrypted=true`.

          Security note: these artifacts are automated CI builds. macOS notarization and Windows code signing are not yet implemented; keep that as a release blocker for a production-trust distribution channel.
          EOF

      - name: Publish release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: LM Talk Node ${{ env.RELEASE_TAG }}
          body_path: RELEASE_NOTES.md
          draft: false
          prerelease: true
          files: |
            release-dist/*
