name: Release Node Artifacts

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to create/update, for example v0.1.0'
        required: true
        type: string

permissions:
  contents: write
  packages: write

concurrency:
  group: release-node-${{ github.event.inputs.tag || github.ref_name }}
  cancel-in-progress: false

env:
  RELEASE_TAG: ${{ github.event.inputs.tag || github.ref_name }}

jobs:
  publish-node-container:
    name: Publish lm_node container
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/laomou/lm-talk-node
          tags: |
            type=semver,pattern={{version}},value=${{ env.RELEASE_TAG }}
            type=semver,pattern={{major}}.{{minor}},value=${{ env.RELEASE_TAG }}
            type=raw,value=latest,enable=${{ !contains(env.RELEASE_TAG, '-') }}

      - name: Build and push multi-architecture image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/lm-node-public/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  publish-web-container:
    name: Publish LM Talk Web container
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/laomou/lm-talk-web
          tags: |
            type=semver,pattern={{version}},value=${{ env.RELEASE_TAG }}
            type=semver,pattern={{major}}.{{minor}},value=${{ env.RELEASE_TAG }}
            type=raw,value=latest,enable=${{ !contains(env.RELEASE_TAG, '-') }}

      - name: Build and push multi-architecture image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/web/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            BUILD_REF=${{ env.RELEASE_TAG }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  build-node:
    name: Build ${{ matrix.package_name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            package_name: lm_node-linux-x86_64
            cargo_features: ''
          - os: macos-15-intel
            target: x86_64-apple-darwin
            package_name: lm_node-macos-x86_64
            cargo_features: ''
          - os: macos-latest
            target: aarch64-apple-darwin
            package_name: lm_node-macos-arm64
            cargo_features: ''
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            package_name: lm_node-windows-x86_64
            cargo_features: ''

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: .
          key: release-node-${{ matrix.target }}-${{ matrix.package_name }}

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Build native node
        shell: bash
        run: |
          set -euo pipefail
          if [[ -n "${{ matrix.cargo_features }}" ]]; then
            cargo build --locked --release -p lm_node --target ${{ matrix.target }} --features "${{ matrix.cargo_features }}"
          else
            cargo build --locked --release -p lm_node --target ${{ matrix.target }}
          fi

      - name: Smoke test binary help
        if: ${{ matrix.target != 'aarch64-apple-darwin' || runner.arch == 'ARM64' }}
        shell: bash
        run: |
          set -euo pipefail
          BIN="target/${{ matrix.target }}/release/lm_node"
          if [[ "${{ matrix.target }}" == *"windows"* || "${{ matrix.target }}" == *"msvc"* ]]; then
            BIN="${BIN}.exe"
          fi
          "$BIN" > lm_node_help.txt 2>&1
          grep -q "LM Talk" lm_node_help.txt

      - name: Package native node
        run: >-
          python scripts/release-package.py
          --target ${{ matrix.target }}
          --package-name ${{ matrix.package_name }}
          --cargo-features "${{ matrix.cargo_features }}"
          --out-dir dist

      - name: Create signing evidence report
        shell: bash
        run: >-
          ./scripts/release-signing.sh
          --target ${{ matrix.target }}
          --package-name ${{ matrix.package_name }}
          --out dist/${{ matrix.package_name }}-signing-evidence.json

      - name: Upload release package
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.package_name }}
          path: |
            dist/*
          if-no-files-found: error

  publish-release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build-node
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Download release packages
        uses: actions/download-artifact@v8
        with:
          path: release-dist
          merge-multiple: true

      - name: Create combined checksums and release notes
        shell: bash
        run: |
          set -euo pipefail
          cd release-dist
          cat *.sha256 | sort > SHA256SUMS.txt
          cd ..
          cat > RELEASE_NOTES.md <<'EOF'
          # LM Talk native node artifacts

          This release publishes native `lm_node` binaries for:

          - Linux x86_64: `lm_node-linux-x86_64.tar.gz`
          - macOS Intel: `lm_node-macos-x86_64.tar.gz`
          - macOS Apple Silicon: `lm_node-macos-arm64.tar.gz`
          - Windows x86_64: `lm_node-windows-x86_64.zip`

          Verify downloads with `SHA256SUMS.txt` or the per-artifact `.sha256` files.

          Each archive intentionally contains only the native `lm_node` binary and `node.config.example.json`. The same tag also publishes multi-architecture containers: `ghcr.io/laomou/lm-talk-node` and `ghcr.io/laomou/lm-talk-web`. For node HTTPS deployment, use the Caddy Compose template under `deploy/lm-node-public/`.

          Config: copy `node.config.example.json`, edit it, and run `lm_node serve-control --config-file node.json`. Field reference is in `docs/NODE_CONFIG.md`.

          Storage note: the node's `state_db` holds relay/mailbox operating state — offline message deliveries are already end-to-end ciphertext, and prekey/public-peer/DHT records are public by design. State is stored as plaintext; for disk-at-rest protection use full-disk encryption (LUKS/dm-crypt).

          Security note: these artifacts are automated CI builds. macOS notarization and Windows code signing are scaffolded as evidence reports but not yet implemented; keep unsigned / non-notarized artifacts as a release blocker for a production-trust distribution channel. Review `*-signing-evidence.json` for each artifact.
          EOF

      - name: Publish release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: LM Talk Node ${{ env.RELEASE_TAG }}
          body_path: RELEASE_NOTES.md
          draft: false
          prerelease: true
          files: |
            release-dist/*
