name: Release Node Artifacts

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to create/update, for example v0.1.0'
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release-node-${{ github.event.inputs.tag || github.ref_name }}
  cancel-in-progress: false

env:
  RELEASE_TAG: ${{ github.event.inputs.tag || github.ref_name }}

jobs:
  build-node:
    name: Build ${{ matrix.package_name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            package_name: lm_node-linux-x86_64
            cargo_features: ''
          - os: macos-15-intel
            target: x86_64-apple-darwin
            package_name: lm_node-macos-x86_64
            cargo_features: ''
          - os: macos-latest
            target: aarch64-apple-darwin
            package_name: lm_node-macos-arm64
            cargo_features: ''
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            package_name: lm_node-windows-x86_64
            cargo_features: ''

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: .
          key: release-node-${{ matrix.target }}-${{ matrix.package_name }}

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Setup Node
        uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/node-admin/package-lock.json

      - name: Build native node
        shell: bash
        run: |
          set -euo pipefail
          if [[ -n "${{ matrix.cargo_features }}" ]]; then
            cargo build --locked --release -p lm_node --target ${{ matrix.target }} --features "${{ matrix.cargo_features }}"
          else
            cargo build --locked --release -p lm_node --target ${{ matrix.target }}
          fi

      - name: Smoke test binary help
        if: ${{ matrix.target != 'aarch64-apple-darwin' || runner.arch == 'ARM64' }}
        shell: bash
        run: |
          set -euo pipefail
          BIN="target/${{ matrix.target }}/release/lm_node"
          if [[ "${{ matrix.target }}" == *"windows"* || "${{ matrix.target }}" == *"msvc"* ]]; then
            BIN="${BIN}.exe"
          fi
          "$BIN" > lm_node_help.txt 2>&1
          grep -q "LM Talk" lm_node_help.txt

      - name: Build node-admin bundle
        shell: bash
        run: |
          set -euo pipefail
          cd apps/node-admin
          npm ci
          npm run build
          cd dist
          if command -v zip >/dev/null 2>&1; then
            zip -r -q "$GITHUB_WORKSPACE/node_admin.zip" .
          else
            python -c "import shutil; shutil.make_archive('$GITHUB_WORKSPACE/node_admin', 'zip', '.')"
          fi

      - name: Package native node
        run: >-
          python scripts/release-package.py
          --target ${{ matrix.target }}
          --package-name ${{ matrix.package_name }}
          --cargo-features "${{ matrix.cargo_features }}"
          --web-admin-zip node_admin.zip
          --out-dir dist

      - name: Create signing evidence report
        shell: bash
        run: >-
          ./scripts/release-signing.sh
          --target ${{ matrix.target }}
          --package-name ${{ matrix.package_name }}
          --out dist/${{ matrix.package_name }}-signing-evidence.json

      - name: Upload release package
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.package_name }}
          path: |
            dist/*
          if-no-files-found: error

  publish-release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build-node
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Download release packages
        uses: actions/download-artifact@v8
        with:
          path: release-dist
          merge-multiple: true

      - name: Create combined checksums and release notes
        shell: bash
        run: |
          set -euo pipefail
          cd release-dist
          cat *.sha256 | sort > SHA256SUMS.txt
          cd ..
          cat > RELEASE_NOTES.md <<'EOF'
          # LM Talk native node artifacts

          This release publishes native `lm_node` binaries for:

          - Linux x86_64: `lm_node-linux-x86_64.tar.gz`
          - macOS Intel: `lm_node-macos-x86_64.tar.gz`
          - macOS Apple Silicon: `lm_node-macos-arm64.tar.gz`
          - Windows x86_64: `lm_node-windows-x86_64.zip`

          Verify downloads with `SHA256SUMS.txt` or the per-artifact `.sha256` files. Each archive also includes `RELEASE_INFO.txt` with the source commit, build timestamp, Rust toolchain details, and binary SHA256.

          Web admin: each archive bundles `node_admin.zip` (the node operator dashboard). Serve it with `lm_node serve-control --web-admin node_admin.zip` and open `http://127.0.0.1:8787/admin/` (loopback only).

          Storage note: the node's `state_db` holds relay/mailbox operating state — offline message deliveries are already end-to-end ciphertext, and prekey/public-peer/DHT records are public by design. State is stored as plaintext; for disk-at-rest protection use full-disk encryption (LUKS/dm-crypt).

          Security note: these artifacts are automated CI builds. macOS notarization and Windows code signing are scaffolded as evidence reports but not yet implemented; keep unsigned / non-notarized artifacts as a release blocker for a production-trust distribution channel. Review `*-signing-evidence.json` for each artifact.
          EOF

      - name: Publish release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: LM Talk Node ${{ env.RELEASE_TAG }}
          body_path: RELEASE_NOTES.md
          draft: false
          prerelease: true
          files: |
            release-dist/*
