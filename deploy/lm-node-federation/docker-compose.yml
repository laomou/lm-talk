services:
  caddy-a:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on: [node-a]
    ports:
      - "8081:80"
    volumes:
      - ./Caddyfile.a:/etc/caddy/Caddyfile:ro
      - caddy_a_data:/data
      - caddy_a_config:/config

  caddy-b:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on: [node-b]
    ports:
      - "8082:80"
    volumes:
      - ./Caddyfile.b:/etc/caddy/Caddyfile:ro
      - caddy_b_data:/data
      - caddy_b_config:/config

  caddy-c:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on: [node-c]
    ports:
      - "8083:80"
    volumes:
      - ./Caddyfile.c:/etc/caddy/Caddyfile:ro
      - caddy_c_data:/data
      - caddy_c_config:/config

  node-a:
    build:
      context: ../..
      dockerfile: deploy/lm-node-public/Dockerfile
    image: lm-talk/lm-node-public:local
    restart: unless-stopped
    command: ["serve-control", "--config-file", "/app/config.json"]
    expose: ["8787"]
    volumes:
      - node_a_data:/data
      - ./node-a.json:/app/config.json:ro
      - ./secrets:/run/secrets:ro

  node-b:
    image: lm-talk/lm-node-public:local
    restart: unless-stopped
    command: ["serve-control", "--config-file", "/app/config.json"]
    expose: ["8787"]
    volumes:
      - node_b_data:/data
      - ./node-b.json:/app/config.json:ro
      - ./secrets:/run/secrets:ro

  node-c:
    image: lm-talk/lm-node-public:local
    restart: unless-stopped
    command: ["serve-control", "--config-file", "/app/config.json"]
    expose: ["8787"]
    volumes:
      - node_c_data:/data
      - ./node-c.json:/app/config.json:ro
      - ./secrets:/run/secrets:ro

volumes:
  node_a_data:
  node_b_data:
  node_c_data:
  caddy_a_data:
  caddy_a_config:
  caddy_b_data:
  caddy_b_config:
  caddy_c_data:
  caddy_c_config:
