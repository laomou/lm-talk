services:
  lm-node:
    build:
      context: ../..
      dockerfile: deploy/lm-node-public/Dockerfile
    image: lm-talk/lm-node-public:local
    restart: unless-stopped
    command: ["serve-control", "--config-file", "/app/config.json"]
    ports:
      - "8787:8787"
    volumes:
      - lm_node_data:/data
      - ./config.json:/app/config.json:ro
      - ./secrets:/run/secrets:ro
    healthcheck:
      test: ["CMD", "/usr/local/bin/lm_node", "distance", "--a", "health-a", "--b", "health-b"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  lm_node_data:
