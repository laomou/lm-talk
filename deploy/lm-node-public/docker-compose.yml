services:
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      - lm-node
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

  lm-node:
    image: ${LM_TALK_NODE_IMAGE:-ghcr.io/laomou/lm-talk-node:latest}
    restart: unless-stopped
    command: ["serve-control", "--config-file", "/app/config.json"]
    expose:
      - "8787"
    volumes:
      - lm_node_data:/data
      - ./config.json:/app/config.json:ro
      - ./secrets:/run/secrets:ro
    healthcheck:
      test: ["CMD", "/usr/local/bin/lm_node", "distance", "--a", "health-a", "--b", "health-b"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  lm_node_data:
  caddy_data:
  caddy_config:
